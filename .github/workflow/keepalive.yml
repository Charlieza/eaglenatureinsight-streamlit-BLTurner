name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app with retries
        run: |
          for i in 1 2 3; do
            curl -L --fail --silent --show-error "https://blturner-pilot.streamlit.app" > /dev/null && exit 0
            sleep 20
          done
          exit 1
