name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit health endpoint
        run: |
          URL="https://blturner-pilot.streamlit.app/_stcore/health"

          for i in 1 2 3; do
            code=$(curl \
              --silent \
              --show-error \
              --output /dev/null \
              --write-out "%{http_code}" \
              --user-agent "Mozilla/5.0" \
              "$URL" || true)

            if [ "$code" = "200" ]; then
              echo "App is awake"
              exit 0
            fi

            echo "Attempt $i failed with HTTP $code"
            sleep 20
          done

          echo "All attempts failed"
          exit 1
