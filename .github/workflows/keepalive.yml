name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app with retries
        run: |
          URL="https://blturner-pilot.streamlit.app/"
          for i in 1 2 3; do
            code=$(curl \
              --silent \
              --show-error \
              --output /dev/null \
              --write-out "%{http_code}" \
              --max-redirs 10 \
              --user-agent "Mozilla/5.0" \
              "$URL" || true)

            if [ "$code" = "200" ] || [ "$code" = "304" ]; then
              exit 0
            fi

            echo "Attempt $i failed with HTTP $code"
            sleep 20
          done
          exit 1
