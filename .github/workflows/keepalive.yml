name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          ENDPOINTS=(
            "https://blturner-pilot.streamlit.app/_stcore/health"
            "https://blturner-pilot.streamlit.app/"
          )

          success=false

          for url in "${ENDPOINTS[@]}"; do
            echo "Trying $url"

            code=$(curl \
              --silent \
              --show-error \
              --output /dev/null \
              --write-out "%{http_code}" \
              --max-time 30 \
              --max-redirs 5 \
              --user-agent "Mozilla/5.0" \
              "$url" || true)

            echo "HTTP $code from $url"

            if [ "$code" = "200" ] || [ "$code" = "204" ] || [ "$code" = "302" ] || [ "$code" = "307" ]; then
              success=true
              break
            fi

            sleep 10
          done

          if [ "$success" = true ]; then
            echo "Ping completed successfully."
          else
            echo "No successful response, but workflow will still pass."
          fi

          exit 0
